<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="neonGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="1" />
      <stop offset="100%" stop-color="#eab308" stop-opacity="1" />
    </linearGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#eab308" stop-opacity="1" />
      <stop offset="50%" stop-color="#0ea5e9" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0" />
    </radialGradient>
  </defs>

  {/* Outer Cube */}
  <path 
    d="M50 5 L90 28 L90 72 L50 95 L10 72 L10 28 Z" 
    stroke="url(#neonGlow)" 
    stroke-width="4" 
    stroke-linejoin="round"
    fill="none"
  />
  <path d="M10 28 L50 50 L90 28" stroke="url(#neonGlow)" stroke-width="4" stroke-linejoin="round" fill="none" />
  <path d="M50 50 L50 95" stroke="url(#neonGlow)" stroke-width="4" stroke-linejoin="round" fill="none" />

  {/* Inner Cube */}
  <path 
    d="M50 25 L70 36 L70 64 L50 75 L30 64 L30 36 Z" 
    stroke="url(#neonGlow)" 
    stroke-width="5" 
    stroke-linejoin="round"
    fill="url(#neonGlow)"
    fill-opacity="0.2"
  />
  
  {/* The Core Spark */}
  <circle cx="50" cy="48" r="10" fill="url(#coreGlow)" />
  <circle cx="50" cy="48" r="4" fill="#eab308" />
</svg>
